name: Update STAR50 News

on:
  schedule:
    # Runs at 09:10 China time every day.
    - cron: "10 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-star50-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update recent news
        run: python scripts/update_star50_news.py --input ../data/star50_data.json --sleep 1.0

      - name: Commit updated news to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/star50_data.json
          if git diff --cached --quiet; then
            echo "No news changes."
            exit 0
          fi
          git commit -m "Update STAR50 news"
          git push origin main
