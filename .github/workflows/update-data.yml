name: Update STAR50 Data

on:
  schedule:
    # Runs at 18:30 China time every day.
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-star50-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch STAR50 data
        run: python scripts/fetch_star50_data.py --output ../data/star50_data.json

      - name: Commit updated data to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/star50_data.json
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "Update STAR50 data"
          git push origin main

      - name: Publish gh-pages branch
        run: git push origin HEAD:gh-pages --force
